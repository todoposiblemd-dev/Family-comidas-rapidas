<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caja Restaurante · Family</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:      #0f1a10;
      --bg2:     #141f15;
      --card:    #1b2b1d;
      --card2:   #223325;
      --verde:   #2E8A58;
      --verde2:  #3AAA6A;
      --naranja: #D07020;
      --naranja2:#E09040;
      --rojo:    #B03030;
      --texto:   #e4ede6;
      --muted:   #7aa882;
      --border:  rgba(255,255,255,0.08);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--texto);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      background: linear-gradient(135deg, #0a150c 0%, #182a1a 100%);
      border-bottom: 2px solid var(--verde);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-logo { font-size: 1.8rem; }
    .header-title { font-family: 'DM Serif Display', serif; font-size: 1.3rem; color: var(--verde2); }
    .header-sub   { font-size: .72rem; color: var(--muted); }

    .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }

    .turno-info {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: .75rem;
      color: var(--muted);
      text-align: right;
    }

    .turno-info strong { color: var(--verde2); display: block; font-size: .9rem; }

    .btn-cierre {
      background: var(--verde);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 9px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: .83rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-cierre:hover { background: var(--verde2); }

    .back-btn {
      text-decoration: none;
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 7px 12px;
      border-radius: 8px;
      font-size: .78rem;
    }

    /* ── LAYOUT MAIN ── */
    .main-layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      min-height: calc(100vh - 68px);
    }

    /* ── PANEL IZQUIERDO (PRODUCTOS) ── */
    .panel-productos {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    /* ── ENTRADA POR CÓDIGO ── */
    .codigo-bar {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .codigo-bar label {
      font-size: .8rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .codigo-input {
      width: 80px;
      background: var(--card);
      border: 2px solid var(--verde);
      border-radius: 10px;
      padding: 8px 12px;
      color: var(--texto);
      font-family: 'DM Sans', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      text-align: center;
      outline: none;
    }

    .cant-input {
      width: 60px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      color: var(--texto);
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      text-align: center;
      outline: none;
    }

    .btn-agregar {
      background: var(--verde);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 9px 16px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: .85rem;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-agregar:hover { background: var(--verde2); }

    .codigo-hint {
      font-size: .72rem;
      color: var(--muted);
    }

    /* ── TABS CATEGORÍA ── */
    .tabs-cat {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      display: flex;
      gap: 2px;
      overflow-x: auto;
    }

    .tab-cat {
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: .82rem;
      font-weight: 600;
      padding: 10px 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: all .2s;
    }
    .tab-cat:hover { color: var(--texto); }
    .tab-cat.active { color: var(--verde2); border-bottom-color: var(--verde); }

    /* ── GRID PRODUCTOS ── */
    .productos-scroll { flex: 1; overflow-y: auto; padding: 14px 16px; }

    .productos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
    }

    .prod-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 10px;
      cursor: pointer;
      transition: all .18s;
      text-align: center;
      position: relative;
      user-select: none;
    }

    .prod-card:hover {
      background: var(--card2);
      border-color: var(--verde);
      transform: translateY(-2px);
    }

    .prod-card:active { transform: scale(0.97); }

    .prod-codigo {
      position: absolute;
      top: 6px; left: 8px;
      font-size: .65rem;
      font-weight: 700;
      color: var(--muted);
      background: rgba(255,255,255,0.06);
      padding: 1px 5px;
      border-radius: 5px;
    }

    .prod-emoji { font-size: 1.6rem; margin-bottom: 5px; }

    .prod-nombre {
      font-size: .78rem;
      font-weight: 600;
      color: var(--texto);
      line-height: 1.3;
      margin-bottom: 4px;
    }

    .prod-precio {
      font-size: .82rem;
      font-weight: 700;
      color: var(--verde2);
    }

    /* ── PANEL DERECHO (PEDIDO) ── */
    .panel-pedido {
      display: flex;
      flex-direction: column;
      background: var(--bg2);
    }

    .pedido-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .pedido-header h3 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      color: var(--texto);
    }

    .btn-limpiar {
      background: none;
      border: 1px solid rgba(180,60,60,0.4);
      color: #E08080;
      border-radius: 8px;
      padding: 5px 12px;
      font-size: .75rem;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all .2s;
    }
    .btn-limpiar:hover { background: rgba(180,60,60,0.15); }

    .pedido-items { flex: 1; overflow-y: auto; padding: 10px 14px; }

    .item-vacio {
      text-align: center;
      padding: 40px 16px;
      color: var(--muted);
      font-size: .85rem;
    }

    .item-vacio .ico { font-size: 2.5rem; margin-bottom: 8px; }

    .pedido-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .item-info { flex: 1; }
    .item-nombre { font-size: .84rem; font-weight: 600; color: var(--texto); }
    .item-subtotal { font-size: .78rem; color: var(--verde2); font-weight: 700; margin-top: 2px; }

    .item-cant-ctrl {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .cant-btn {
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--texto);
      width: 26px;
      height: 26px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s;
    }
    .cant-btn:hover { background: var(--verde); }

    .item-cant-num {
      font-weight: 700;
      font-size: .9rem;
      min-width: 20px;
      text-align: center;
    }

    .btn-eliminar {
      background: none;
      border: none;
      color: #E08080;
      cursor: pointer;
      font-size: 1rem;
      padding: 2px;
      opacity: .7;
      transition: opacity .15s;
    }
    .btn-eliminar:hover { opacity: 1; }

    /* ── DESTINO / MESA ── */
    .destino-row {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
    }

    .destino-row label {
      font-size: .72rem;
      color: var(--muted);
      display: block;
      margin-bottom: 7px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .8px;
    }

    .destino-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .destino-btn {
      background: var(--card2);
      border: 2px solid var(--border);
      color: var(--texto);
      border-radius: 8px;
      padding: 5px 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }

    .destino-btn:hover { border-color: var(--verde); }
    .destino-btn.selected { background: var(--verde); border-color: var(--verde2); color: white; }
    .destino-btn.tipo-llevar   { }
    .destino-btn.tipo-domicilio{ }

    .destino-indicador {
      margin-top: 7px;
      font-size: .78rem;
      color: var(--verde2);
      font-weight: 700;
      min-height: 18px;
    }

    /* ── NOTA ── */
    .nota-row {
      padding: 6px 14px;
      border-bottom: 1px solid var(--border);
    }

    .nota-input {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 10px;
      color: var(--texto);
      font-family: 'DM Sans', sans-serif;
      font-size: .8rem;
      outline: none;
      resize: none;
    }
    .nota-input::placeholder { color: var(--muted); }

    /* ── RESUMEN PEDIDO ── */
    .pedido-resumen {
      padding: 12px 14px;
      border-top: 1px solid var(--border);
      background: var(--card);
    }

    .resumen-row {
      display: flex;
      justify-content: space-between;
      font-size: .82rem;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .resumen-total {
      display: flex;
      justify-content: space-between;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--texto);
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }

    .resumen-total .monto { color: var(--verde2); }

    /* ── PAGO ── */
    .pago-row {
      padding: 10px 14px;
      background: var(--card);
      border-top: 1px solid var(--border);
    }

    .pago-row label { font-size: .75rem; color: var(--muted); display: block; margin-bottom: 6px; }

    .pago-btns { display: flex; gap: 6px; }

    .pago-btn {
      flex: 1;
      background: var(--card2);
      border: 2px solid var(--border);
      color: var(--texto);
      border-radius: 10px;
      padding: 8px 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .18s;
      text-align: center;
    }

    .pago-btn:hover { border-color: var(--verde); }
    .pago-btn.selected { background: var(--verde); border-color: var(--verde2); color: white; }

    /* ── BOTONES ENVIAR ── */
    .enviar-btns {
      padding: 10px 14px 14px;
      background: var(--card);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn-cocina {
      background: var(--naranja);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 13px;
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      text-decoration: none;
    }
    .btn-cocina:hover { background: var(--naranja2); }

    .btn-confirmar {
      background: var(--verde);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 13px;
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn-confirmar:hover { background: var(--verde2); }

    /* ── FLASH ── */
    .flash {
      position: fixed;
      bottom: 24px; right: 24px;
      background: var(--verde);
      color: white;
      padding: 12px 20px;
      border-radius: 12px;
      font-weight: 600;
      font-size: .88rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      opacity: 0;
      transform: translateY(10px);
      transition: all .3s;
      pointer-events: none;
      z-index: 99;
    }
    .flash.show { opacity: 1; transform: translateY(0); }

    /* ── MODAL CIERRE ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }

    .modal-box {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px 24px;
      max-width: 400px;
      width: 100%;
    }

    .modal-box h3 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.3rem;
      color: var(--verde2);
      margin-bottom: 6px;
    }

    .modal-box p { font-size: .85rem; color: var(--muted); margin-bottom: 18px; }

    .modal-row { margin-bottom: 12px; }

    .modal-row label { font-size: .75rem; color: var(--muted); display: block; margin-bottom: 4px; }

    .modal-row input {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      color: var(--texto);
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      outline: none;
    }

    .modal-row input:focus { border-color: var(--verde); }

    .modal-btns { display: flex; gap: 8px; margin-top: 16px; }

    .btn-modal-cancel {
      flex: 1;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 10px;
      padding: 10px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
    }

    .btn-modal-ok {
      flex: 2;
      background: var(--verde);
      border: none;
      color: white;
      border-radius: 10px;
      padding: 10px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s;
      text-decoration: none;
      text-align: center;
      display: block;
    }
    .btn-modal-ok:hover { background: var(--verde2); }

    .pin-row { margin-top: 12px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 720px) {
      .main-layout { grid-template-columns: 1fr; }
      .panel-productos { border-right: none; border-bottom: 1px solid var(--border); max-height: 55vh; }
      .panel-pedido { max-height: 45vh; }
      .header { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="header-logo">🍳</div>
    <div>
      <div class="header-title">Caja Restaurante</div>
      <div class="header-sub">Family · Menú Diurno · Guapi</div>
    </div>
  </div>
  <div class="header-right">
    <div class="turno-info">
      <strong id="contadorPedidos">0 pedidos</strong>
      <span id="fechaHoy"></span>
    </div>
    <button class="btn-cierre" onclick="abrirCierre()">📊 Cierre del día</button>
    <a href="index.html" class="back-btn">← Inicio</a>
  </div>
</div>

<!-- LAYOUT PRINCIPAL -->
<div class="main-layout">

  <!-- PANEL PRODUCTOS -->
  <div class="panel-productos">

    <!-- ENTRADA POR CÓDIGO -->
    <div class="codigo-bar">
      <label>Código</label>
      <input type="number" id="codigoInput" class="codigo-input" min="1" max="14"
             placeholder="01" onkeydown="codigoKeydown(event)">
      <label>Cant.</label>
      <input type="number" id="cantInput" class="cant-input" min="1" value="1"
             onkeydown="codigoKeydown(event)">
      <button class="btn-agregar" onclick="agregarPorCodigo()">+ Agregar</button>
      <span class="codigo-hint">Presiona Enter</span>
    </div>

    <!-- TABS CATEGORÍA -->
    <div class="tabs-cat">
      <button class="tab-cat active" onclick="setCategoria('todas', this)">Todas</button>
      <button class="tab-cat" onclick="setCategoria('desayuno', this)">🌅 Desayunos</button>
      <button class="tab-cat" onclick="setCategoria('almuerzo', this)">☀️ Almuerzos</button>
      <button class="tab-cat" onclick="setCategoria('complemento', this)">🍟 Complementos</button>
      <button class="tab-cat" onclick="setCategoria('bebida', this)">🥤 Bebidas</button>
    </div>

    <!-- GRID PRODUCTOS -->
    <div class="productos-scroll">
      <div class="productos-grid" id="gridProductos"></div>
    </div>

  </div>

  <!-- PANEL PEDIDO -->
  <div class="panel-pedido">

    <div class="pedido-header">
      <h3>🧾 Pedido actual</h3>
      <button class="btn-limpiar" onclick="limpiarPedido()">🗑 Limpiar</button>
    </div>

    <div class="pedido-items" id="pedidoItems">
      <div class="item-vacio">
        <div class="ico">🍳</div>
        <p>Agrega productos<br>desde el menú</p>
      </div>
    </div>

    <!-- DESTINO / MESA -->
    <div class="destino-row">
      <label>📍 Destino del pedido</label>
      <div class="destino-btns" id="destinoBtns">
        <button class="destino-btn" onclick="setDestino('Mesa 1')">M1</button>
        <button class="destino-btn" onclick="setDestino('Mesa 2')">M2</button>
        <button class="destino-btn" onclick="setDestino('Mesa 3')">M3</button>
        <button class="destino-btn" onclick="setDestino('Mesa 4')">M4</button>
        <button class="destino-btn" onclick="setDestino('Mesa 5')">M5</button>
        <button class="destino-btn" onclick="setDestino('Mesa 6')">M6</button>
        <button class="destino-btn" onclick="setDestino('Mesa 7')">M7</button>
        <button class="destino-btn" onclick="setDestino('Mesa 8')">M8</button>
        <button class="destino-btn" onclick="setDestino('Mesa 9')">M9</button>
        <button class="destino-btn" onclick="setDestino('Mesa 10')">M10</button>
        <button class="destino-btn tipo-llevar"    onclick="setDestino('Para llevar')">🛍 Llevar</button>
        <button class="destino-btn tipo-domicilio" onclick="setDestino('Domicilio')">🛵 Domicilio</button>
      </div>
      <div class="destino-indicador" id="destinoIndicador">Sin seleccionar</div>
    </div>

    <div class="nota-row">
      <textarea class="nota-input" id="notaInput" rows="2"
                placeholder="Nota especial (sin cebolla, extra salsa…)"></textarea>
    </div>

    <div class="pedido-resumen" id="pedidoResumen" style="display:none">
      <div class="resumen-row"><span>Subtotal</span><span id="resSubtotal">$0</span></div>
      <div class="resumen-row" id="rowItems"></div>
      <div class="resumen-total">
        <span>TOTAL</span>
        <span class="monto" id="resTotal">$0</span>
      </div>
    </div>

    <div class="pago-row">
      <label>Método de pago</label>
      <div class="pago-btns">
        <button class="pago-btn selected" id="pago-efectivo" onclick="setPago('efectivo')">💵 Efectivo</button>
        <button class="pago-btn" id="pago-nequi"    onclick="setPago('nequi')">📱 Nequi</button>
        <button class="pago-btn" id="pago-credito"  onclick="setPago('credito')">📒 Crédito</button>
      </div>
    </div>

    <div class="enviar-btns">
      <button class="btn-cocina" onclick="enviarCocina()">
        🍳 Enviar a Cocina (WhatsApp)
      </button>
      <button class="btn-confirmar" onclick="confirmarVenta()">
        ✅ Confirmar venta
      </button>
    </div>

  </div>
</div>

<!-- FLASH -->
<div class="flash" id="flash"></div>

<!-- MODAL CIERRE -->
<div class="modal-overlay" id="modalCierre">
  <div class="modal-box">
    <h3>📊 Cierre del Día</h3>
    <p>Ingresa los valores de caja para generar el resumen por WhatsApp a Miryam.</p>

    <div class="modal-row">
      <label>Efectivo en caja ($)</label>
      <input type="number" id="cierreEfectivo" placeholder="0">
    </div>
    <div class="modal-row">
      <label>Total Nequi ($)</label>
      <input type="number" id="cierreNequi" placeholder="0">
    </div>
    <div class="modal-row">
      <label>Total Crédito ($)</label>
      <input type="number" id="cierreCredito" placeholder="0">
    </div>
    <div class="modal-row pin-row">
      <label>PIN de administrador</label>
      <input type="password" id="cierrePIN" placeholder="••••" maxlength="6">
    </div>

    <div class="modal-btns">
      <button class="btn-modal-cancel" onclick="cerrarModal('modalCierre')">Cancelar</button>
      <button class="btn-modal-ok" id="btnCierreWA" onclick="enviarCierre()">📲 Enviar cierre</button>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────
const PIN_ADMIN = '1234';   // ← Cambiar por el PIN real de Miryam
const WA_COCINA  = '573000000000'; // ← Número WhatsApp cocina restaurante
const WA_MIRYAM  = '573000000001'; // ← Número WhatsApp Miryam

// ─── PRODUCTOS ──────────────────────────────────────────
const PRODUCTOS = [
  // DESAYUNOS
  { codigo: '01', nombre: 'Desayuno Básico',            emoji: '🍳', precio:  8000, cat: 'desayuno' },
  { codigo: '02', nombre: 'Desayuno Casero',            emoji: '🍲', precio: 10000, cat: 'desayuno' },
  { codigo: '03', nombre: 'Desayuno Proteína Salchicha',emoji: '🌭', precio: 12000, cat: 'desayuno' },
  { codigo: '04', nombre: 'Desayuno Proteína Carne',    emoji: '🥩', precio: 14000, cat: 'desayuno' },
  // ALMUERZOS
  { codigo: '05', nombre: 'Almuerzo Corriente',         emoji: '🍗', precio: 16000, cat: 'almuerzo' },
  { codigo: '06', nombre: 'Almuerzo Especial',          emoji: '⭐', precio: 18000, cat: 'almuerzo' },
  { codigo: '07', nombre: 'Almuerzo Full',              emoji: '🏆', precio: 22000, cat: 'almuerzo' },
  // COMPLEMENTOS
  { codigo: '08', nombre: 'Porción de Papas',           emoji: '🍟', precio:  5000, cat: 'complemento' },
  { codigo: '09', nombre: 'Pollo Adicional',            emoji: '🍗', precio:  7000, cat: 'complemento' },
  { codigo: '10', nombre: 'Queso Extra',                emoji: '🧀', precio:  2000, cat: 'complemento' },
  // BEBIDAS
  { codigo: '11', nombre: 'Tinto',                      emoji: '☕', precio:  1000, cat: 'bebida' },
  { codigo: '12', nombre: 'Chocolate',                  emoji: '🍫', precio:  2000, cat: 'bebida' },
  { codigo: '13', nombre: 'Jugo Natural',               emoji: '🥤', precio:  4000, cat: 'bebida' },
  { codigo: '14', nombre: 'Gaseosa',                    emoji: '🥫', precio:  4000, cat: 'bebida' },
];

// ─── ESTADO ─────────────────────────────────────────────
let pedido   = [];      // [{producto, cantidad}]
let pagMetodo= 'efectivo';
let catActual= 'todas';
let destino  = '';      // Mesa X | Para llevar | Domicilio

// ─── DESTINO ─────────────────────────────────────────────
function setDestino(valor) {
  destino = valor;
  document.querySelectorAll('.destino-btn').forEach(b => {
    b.classList.toggle('selected', b.textContent.trim().replace('M','Mesa ') === valor ||
      b.textContent.trim() === '🛍 Llevar' && valor === 'Para llevar' ||
      b.textContent.trim() === '🛵 Domicilio' && valor === 'Domicilio');
  });
  // Marcar el correcto
  document.querySelectorAll('.destino-btn').forEach(b => {
    const label = b.getAttribute('onclick').match(/'([^']+)'/)[1];
    b.classList.toggle('selected', label === valor);
  });
  const emoji = valor.startsWith('Mesa') ? '🪑' : valor === 'Para llevar' ? '🛍' : '🛵';
  document.getElementById('destinoIndicador').textContent = emoji + ' ' + valor;
}


const HOY = new Date().toDateString();

function getContador() {
  const stored = JSON.parse(localStorage.getItem('rest_contador') || '{}');
  if (stored.fecha !== HOY) return 0;
  return stored.count || 0;
}

function incrementarContador() {
  const c = getContador() + 1;
  localStorage.setItem('rest_contador', JSON.stringify({ fecha: HOY, count: c }));
  actualizarContador();
}

function actualizarContador() {
  const c = getContador();
  document.getElementById('contadorPedidos').textContent =
    c + (c === 1 ? ' pedido' : ' pedidos');
}

// ─── UTILIDADES ─────────────────────────────────────────
function fmtPeso(v) {
  return '$' + v.toLocaleString('es-CO');
}

function prodPorCodigo(cod) {
  const padded = cod.toString().padStart(2, '0');
  return PRODUCTOS.find(p => p.codigo === padded);
}

function flash(msg, color) {
  const el = document.getElementById('flash');
  el.textContent = msg;
  el.style.background = color || 'var(--verde)';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// ─── FECHA ──────────────────────────────────────────────
function initFecha() {
  const d = new Date();
  const dias = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const meses= ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  document.getElementById('fechaHoy').textContent =
    `${dias[d.getDay()]} ${d.getDate()} ${meses[d.getMonth()]}`;
}

// ─── RENDER PRODUCTOS ───────────────────────────────────
function renderProductos() {
  const grid = document.getElementById('gridProductos');
  const filtrados = catActual === 'todas'
    ? PRODUCTOS
    : PRODUCTOS.filter(p => p.cat === catActual);

  grid.innerHTML = filtrados.map(p => `
    <div class="prod-card" onclick="agregarProducto('${p.codigo}', 1)">
      <span class="prod-codigo">${p.codigo}</span>
      <div class="prod-emoji">${p.emoji}</div>
      <div class="prod-nombre">${p.nombre}</div>
      <div class="prod-precio">${fmtPeso(p.precio)}</div>
    </div>
  `).join('');
}

function setCategoria(cat, btn) {
  catActual = cat;
  document.querySelectorAll('.tab-cat').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderProductos();
}

// ─── PEDIDO ─────────────────────────────────────────────
function agregarProducto(codigo, cantidad) {
  const prod = prodPorCodigo(codigo);
  if (!prod) { flash('Código no encontrado', 'var(--rojo)'); return; }

  const existing = pedido.find(i => i.producto.codigo === prod.codigo);
  if (existing) {
    existing.cantidad += cantidad;
  } else {
    pedido.push({ producto: prod, cantidad });
  }

  renderPedido();
  flash(`✔ ${prod.nombre} ×${cantidad}`);
}

function agregarPorCodigo() {
  const cod  = document.getElementById('codigoInput').value.trim();
  const cant = parseInt(document.getElementById('cantInput').value) || 1;
  if (!cod) return;
  agregarProducto(cod, cant);
  document.getElementById('codigoInput').value = '';
  document.getElementById('cantInput').value  = '1';
  document.getElementById('codigoInput').focus();
}

function codigoKeydown(e) {
  if (e.key === 'Enter') agregarPorCodigo();
}

function cambiarCantidad(idx, delta) {
  pedido[idx].cantidad += delta;
  if (pedido[idx].cantidad <= 0) pedido.splice(idx, 1);
  renderPedido();
}

function eliminarItem(idx) {
  pedido.splice(idx, 1);
  renderPedido();
}

function limpiarPedido() {
  if (pedido.length === 0) return;
  if (!confirm('¿Limpiar el pedido actual?')) return;
  pedido = [];
  document.getElementById('notaInput').value = '';
  renderPedido();
}

function renderPedido() {
  const container = document.getElementById('pedidoItems');
  const resumen   = document.getElementById('pedidoResumen');

  if (pedido.length === 0) {
    container.innerHTML = `<div class="item-vacio"><div class="ico">🍳</div><p>Agrega productos<br>desde el menú</p></div>`;
    resumen.style.display = 'none';
    return;
  }

  container.innerHTML = pedido.map((item, idx) => `
    <div class="pedido-item">
      <div style="font-size:1.3rem">${item.producto.emoji}</div>
      <div class="item-info">
        <div class="item-nombre">${item.producto.nombre}</div>
        <div class="item-subtotal">${fmtPeso(item.producto.precio * item.cantidad)}</div>
      </div>
      <div class="item-cant-ctrl">
        <button class="cant-btn" onclick="cambiarCantidad(${idx}, -1)">−</button>
        <span class="item-cant-num">${item.cantidad}</span>
        <button class="cant-btn" onclick="cambiarCantidad(${idx}, 1)">+</button>
      </div>
      <button class="btn-eliminar" onclick="eliminarItem(${idx})">✕</button>
    </div>
  `).join('');

  const total = pedido.reduce((s, i) => s + i.producto.precio * i.cantidad, 0);
  const items = pedido.reduce((s, i) => s + i.cantidad, 0);

  resumen.style.display = 'block';
  document.getElementById('resSubtotal').textContent = fmtPeso(total);
  document.getElementById('rowItems').innerHTML =
    `<span>${items} producto${items !== 1 ? 's' : ''}</span><span></span>`;
  document.getElementById('resTotal').textContent = fmtPeso(total);
}

// ─── PAGO ────────────────────────────────────────────────
function setPago(metodo) {
  pagMetodo = metodo;
  ['efectivo','nequi','credito'].forEach(m => {
    document.getElementById('pago-' + m).classList.toggle('selected', m === metodo);
  });
}

// ─── ENVIAR A COCINA ────────────────────────────────────
function enviarCocina() {
  if (pedido.length === 0) { flash('El pedido está vacío', 'var(--rojo)'); return; }
  if (!destino) { flash('Selecciona mesa o destino primero', 'var(--naranja)'); return; }

  const nota = document.getElementById('notaInput').value.trim();
  const hora  = new Date().toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
  const num   = getContador() + 1;
  const emoji = destino.startsWith('Mesa') ? '🪑' : destino === 'Para llevar' ? '🛍' : '🛵';

  let msg = `*🍳 PEDIDO #${num} — Restaurante Family*\n`;
  msg += `${emoji} *${destino}*\n`;
  msg += `🕐 ${hora}\n\n`;
  msg += `*Productos:*\n`;
  pedido.forEach(i => {
    msg += `• ${i.cantidad}× ${i.producto.emoji} ${i.producto.nombre}\n`;
  });
  if (nota) msg += `\n📝 Nota: ${nota}`;
  msg += `\n\n_Restaurante Family · Guapi_`;

  const url = `https://wa.me/${WA_COCINA}?text=${encodeURIComponent(msg)}`;
  window.open(url, '_blank');
}

// ─── CONFIRMAR VENTA ────────────────────────────────────
function confirmarVenta() {
  if (pedido.length === 0) { flash('El pedido está vacío', 'var(--rojo)'); return; }
  if (!destino) { flash('Selecciona mesa o destino primero', 'var(--naranja)'); return; }

  const total = pedido.reduce((s, i) => s + i.producto.precio * i.cantidad, 0);
  const num    = getContador() + 1;

  // Guardar en resumen del día
  const resumen = JSON.parse(localStorage.getItem('rest_resumen_' + HOY) || '{}');
  resumen.total    = (resumen.total    || 0) + total;
  resumen.pedidos  = (resumen.pedidos  || 0) + 1;
  resumen[pagMetodo] = (resumen[pagMetodo] || 0) + total;
  localStorage.setItem('rest_resumen_' + HOY, JSON.stringify(resumen));

  incrementarContador();
  flash(`✅ Pedido #${num} · ${destino} · ${fmtPeso(total)}`);

  // Limpiar
  pedido = [];
  destino = '';
  document.getElementById('notaInput').value = '';
  document.getElementById('destinoIndicador').textContent = 'Sin seleccionar';
  document.querySelectorAll('.destino-btn').forEach(b => b.classList.remove('selected'));
  renderPedido();
}

// ─── CIERRE DEL DÍA ─────────────────────────────────────
function abrirCierre() {
  document.getElementById('modalCierre').classList.add('open');
}

function cerrarModal(id) {
  document.getElementById(id).classList.remove('open');
}

function enviarCierre() {
  const pin = document.getElementById('cierrePIN').value;
  if (pin !== PIN_ADMIN) {
    flash('PIN incorrecto', 'var(--rojo)');
    return;
  }

  const efectivo = parseInt(document.getElementById('cierreEfectivo').value) || 0;
  const nequi    = parseInt(document.getElementById('cierreNequi').value)    || 0;
  const credito  = parseInt(document.getElementById('cierreCredito').value)  || 0;
  const total    = efectivo + nequi + credito;

  const resumen  = JSON.parse(localStorage.getItem('rest_resumen_' + HOY) || '{}');
  const pedidos  = resumen.pedidos || 0;
  const d = new Date();
  const fechaStr = d.toLocaleDateString('es-CO', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  let msg = `*📊 CIERRE DEL DÍA — Restaurante Family*\n`;
  msg += `📅 ${fechaStr}\n\n`;
  msg += `*Ventas del día:*\n`;
  msg += `• Pedidos registrados: ${pedidos}\n`;
  msg += `\n*Recaudo:*\n`;
  msg += `💵 Efectivo: ${fmtPeso(efectivo)}\n`;
  msg += `📱 Nequi: ${fmtPeso(nequi)}\n`;
  msg += `📒 Crédito: ${fmtPeso(credito)}\n`;
  msg += `\n💰 *TOTAL: ${fmtPeso(total)}*\n`;
  msg += `\n_Restaurante Family · Guapi_`;

  const url = `https://wa.me/${WA_MIRYAM}?text=${encodeURIComponent(msg)}`;
  window.open(url, '_blank');
  cerrarModal('modalCierre');
}

// ─── INIT ────────────────────────────────────────────────
initFecha();
actualizarContador();
renderProductos();
renderPedido();
document.getElementById('codigoInput').focus();
</script>
</body>
</html>
